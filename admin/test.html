<!DOCTYPE html>
<html>
<head><title>Dashboard Test</title></head>
<body style="background:#0a0a0a;color:#0f0;font-family:monospace;padding:40px;">
<h1>🧪 Dashboard Connection Test</h1>
<div id="status">Testing...</div>
<div id="data"></div>
<script>
async function test() {
    try {
        // Test login
        const loginResp = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            credentials: 'include',
            body: JSON.stringify({username: 'henry', password: 'Pi5Admin2026!'})
        });
        const loginData = await loginResp.json();
        
        if (!loginData.success) {
            document.getElementById('status').innerHTML = '❌ Login failed: ' + loginData.error;
            return;
        }
        
        document.getElementById('status').innerHTML = '✅ Login successful!';
        
        // Test stats
        const statsResp = await fetch('/api/stats', {credentials: 'include'});
        const data = await statsResp.json();
        
        document.getElementById('data').innerHTML = `
            <h2>✅ API Working!</h2>
            <p>CPU: ${data.piStats.cpu}%</p>
            <p>Memory: ${data.piStats.mem}</p>
            <p>Temperature: ${data.piStats.temp}</p>
            <p>Processes: ${data.piStats.processes.length} items</p>
            <p>First Process: ${data.piStats.processes[0].command}</p>
            <p>Kuma Monitors: ${data.kumaStatus.length} items</p>
            <hr>
            <p><strong>✅ All data is present and correct!</strong></p>
            <p>Now go to <a href="/admin/" style="color:#0ff">/admin/</a> and press Ctrl+Shift+R to hard refresh</p>
        `;
    } catch (e) {
        document.getElementById('status').innerHTML = '❌ Error: ' + e.message;
    }
}
test();
</script>
</body>
</html>
